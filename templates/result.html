<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAUSE 1s - Result</title>
<style>
body { margin:0; padding:0; font-family:'Courier New', monospace; background-color:#001f3f; color:#0ff; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { width:90%; max-width:600px; text-align:center; background-color: rgba(0,0,30,0.85); padding:30px; border-radius:20px; box-shadow:0 0 25px #0ff; }
.score { font-size:28px; font-weight:bold; margin-bottom:10px; }
.message { font-size:20px; font-weight:bold; margin-bottom:15px; }
button { padding:10px 25px; border-radius:20px; border:none; cursor:pointer; background:#0ff; color:#001f3f; font-size:14px; margin:5px; }
button:hover{ background:#00f; color:#fff; }
.tech-details { display:none; text-align:left; margin-top:15px; border-top:1px solid #0ff; padding-top:15px; }
</style>
<script>
function toggleDetails(){ const d=document.getElementById("tech-details"); d.style.display=(d.style.display==='none')?'block':'none'; }
function goBack(){ window.location.href="/home"; }
</script>
</head>
<body>
<div class="container">
    <div class="score">🔐 Trust Score: {{ score }}/100</div>
    <div class="message">{{ message }}</div>
    <button onclick="toggleDetails()">View More</button>
    <div class="tech-details" id="tech-details">
        {% for key, value in technical.items() %}
            <p><strong>{{ key }}:</strong> {{ value }}</p>
        {% endfor %}
    </div>
    <button onclick="goBack()">Check Another URL</button>
</div>
</body>
</html>
