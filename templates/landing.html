<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAUSE 1s</title>
<style>
body {
    margin:0; padding:0; font-family: 'Courier New', monospace;
    height:100vh; display:flex; justify-content:center; align-items:center;
    background: url('{{ url_for("static", filename="landing_bg.jpeg") }}') no-repeat center center fixed;
    background-size: cover; color:#00f;
}
.container { text-align:center; background-color: rgba(0,0,30,0.7); padding:50px; border-radius:20px; }
h1 { font-size:50px; animation: pulse 2s infinite; }
@keyframes pulse { 0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);} }
button { padding:15px 40px; font-size:18px; border-radius:30px; cursor:pointer; background:#00f; color:#fff; border:none; margin-top:30px; }
button:hover{ background:#0ff; }
</style>
</head>
<body>
<div class="container">
    <h1>PAUSE 1s</h1>
    <p>One second to analyze, one click to decide.</p>
    <form action="/home">
        <button type="submit">Start</button>
    </form>
</div>
</body>
</html>
